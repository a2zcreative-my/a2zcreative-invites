<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berjaya | A2Z Creative</title>

    <link rel="icon" href="/favicon.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css">

    <style>
        .success-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #0a192f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .success-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .success-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: #d4af37;
            margin: 0 0 0.5rem 0;
        }

        .success-card p {
            color: #ccd6f6;
            margin: 0 0 1.5rem 0;
        }

        .order-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #8892b0;
            font-size: 0.875rem;
        }

        .detail-value {
            color: #ffffff;
            font-weight: 500;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            border: none;
            border-radius: 0.5rem;
            color: #0a192f;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            color: #ccd6f6;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="success-page">
    <canvas class="confetti" id="confetti"></canvas>

    <div class="success-card">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>Pembayaran Berjaya!</h1>
        <p>Terima kasih! Pakej anda telah diaktifkan.</p>

        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">No. Pesanan</span>
                <span class="detail-value" id="orderRef">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Pakej</span>
                <span class="detail-value" id="packageName">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value" style="color: #28a745;">Aktif</span>
            </div>
        </div>

        <a href="/dashboard" class="btn-primary">
            <i data-lucide="layout-dashboard"></i>
            Ke Dashboard
        </a>

        <a href="/create-invitation" class="btn-secondary" id="editEventBtn" style="display: none;">
            <i data-lucide="edit"></i>
            Edit Jemputan Anda
        </a>
    </div>

    <script>
        lucide.createIcons();

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const orderRef = urlParams.get('order_ref');
        const packageId = urlParams.get('package');
        const eventId = urlParams.get('event_id');

        const PACKAGES = {
            basic: 'Asas',
            premium: 'Premium',
            business: 'Bisnes'
        };

        // Display order info
        if (orderRef) {
            document.getElementById('orderRef').textContent = orderRef;
        }
        if (packageId && PACKAGES[packageId]) {
            document.getElementById('packageName').textContent = PACKAGES[packageId];
        }
        if (eventId) {
            const editBtn = document.getElementById('editEventBtn');
            editBtn.style.display = 'flex';
            editBtn.href = `/create-invitation?event_id=${eventId}`;
        }

        // Confetti animation
        function createConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#d4af37', '#f4d03f', '#28a745', '#20c997', '#ffffff'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 3 + 2,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
                    ctx.restore();

                    p.x += p.vx;
                    p.y += p.vy;
                    p.rotation += p.rotationSpeed;
                    p.vy += 0.05;
                });

                frame++;
                if (frame < 180) {
                    requestAnimationFrame(animate);
                }
            }

            animate();
        }

        // Start confetti on load
        createConfetti();
    </script>
</body>

</html>
