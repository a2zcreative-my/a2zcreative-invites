<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Kata Laluan | A2Z Creative</title>

    <link rel="icon" href="/favicon.png" type="image/png">
    <meta property="og:image" content="https://a2zcreative.my/images/og-thumbnail.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css?v=205">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="/"
                style="display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none;">
                <img src="/logo.png" alt="A2Z Creative" height="48">
                <span class="logo-text-gradient" style="font-size: 1.5rem;">A2ZCreative</span>
            </a>
            <p>Jemputan Digital Profesional</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h2>Reset Kata Laluan</h2>

            <!-- Success Message (hidden by default) -->
            <div class="auth-success" id="authSuccess" style="display: none;">
                <i data-lucide="check-circle"></i>
                <div>
                    <span id="successText">Kata laluan berjaya dikemaskini!</span>
                    <p style="margin: 0.5rem 0 0 0; font-size: 0.85rem; opacity: 0.9;">
                        Anda akan dialihkan ke halaman log masuk...
                    </p>
                </div>
            </div>

            <!-- Error Message -->
            <div class="auth-error" id="authError"></div>

            <!-- Invalid/Expired Link Message -->
            <div class="auth-warning" id="authWarning" style="display: none;">
                <i data-lucide="alert-triangle"></i>
                <div>
                    <strong>Pautan tidak sah atau telah tamat tempoh</strong>
                    <p style="margin: 0.5rem 0 0 0; font-size: 0.85rem;">
                        Sila minta pautan reset kata laluan yang baru.
                    </p>
                </div>
            </div>

            <!-- Reset Form -->
            <form class="auth-form" id="resetForm">
                <div class="form-group">
                    <label for="password">Kata Laluan Baru</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <small style="color: #8892b0; font-size: 0.75rem; margin-top: 0.25rem; display: block;">
                        Minimum 6 aksara
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Sahkan Kata Laluan</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                            required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit" id="submitBtn">
                    <span class="btn-text">Kemaskini Kata Laluan</span>
                    <span class="auth-loading" id="loadingSpinner">
                        <span class="spinner"></span>
                        Mengemaskini...
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <a href="/auth/login.html" style="display: inline-flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                    Kembali ke Log Masuk
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        lucide.createIcons();

        // Initialize Supabase
        const SUPABASE_URL = 'https://bzxjsdtkoakscmeuthlu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ksSZeGQ4toGfqLttrL7Vsw_8Vq2AVxi';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const authWarning = document.getElementById('authWarning');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function showError(message) {
            authError.textContent = message;
            authError.style.display = 'block';
            authSuccess.style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            authSuccess.style.display = 'flex';
            authError.style.display = 'none';
            form.style.display = 'none';
        }

        function showWarning() {
            authWarning.style.display = 'flex';
            form.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            loadingSpinner.style.display = loading ? 'flex' : 'none';
            submitBtn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline';
        }

        // Password toggle function
        function togglePasswordVisibility(buttonElement) {
            if (!buttonElement) return;

            const wrapper = buttonElement.closest('.password-wrapper');
            const input = wrapper.querySelector('input');

            if (!input) return;

            const isCurrentlyPassword = input.type === 'password';
            input.type = isCurrentlyPassword ? 'text' : 'password';

            const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
            const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

            buttonElement.innerHTML = isCurrentlyPassword ? eyeOffIcon : eyeIcon;
        }

        // Check for valid session on page load
        async function checkSession() {
            try {
                // Supabase handles the token from URL hash automatically
                const { data: { session }, error } = await supabase.auth.getSession();

                if (error) {
                    console.error('Session error:', error);
                    showWarning();
                    return;
                }

                if (!session) {
                    // No session means the link is invalid or expired
                    console.log('No active session found');
                    showWarning();
                    return;
                }

                console.log('Valid session found for password reset');
            } catch (error) {
                console.error('Error checking session:', error);
                showWarning();
            }
        }

        // Handle password reset form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.style.display = 'none';

            const password = form.password.value;
            const confirmPassword = form.confirmPassword.value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showError('Kata laluan tidak sepadan. Sila cuba lagi.');
                return;
            }

            // Validate minimum length
            if (password.length < 6) {
                showError('Kata laluan mestilah sekurang-kurangnya 6 aksara.');
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.updateUser({
                    password: password
                });

                if (error) {
                    throw error;
                }

                // Show success message
                showSuccess('Kata laluan berjaya dikemaskini!');

                // ===========================================
                // SYNC TO D1 DATABASE
                // ===========================================
                try {
                    // We need to fetch the email first since we only have the session
                    const { data: { user } } = await supabase.auth.getUser();

                    if (user && user.email) {
                        await fetch('/api/auth/sync-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: user.email,
                                newPassword: password
                            })
                        });
                    }
                } catch (syncError) {
                    console.warn('Background sync failed:', syncError);
                    // We don't block the UI success for this, but logging it is important
                }

                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = '/auth/login.html?reset=success';
                }, 3000);

            } catch (error) {
                console.error('Password update error:', error);

                if (error.message.includes('session')) {
                    showError('Sesi anda telah tamat. Sila minta pautan reset yang baru.');
                } else if (error.message.includes('weak')) {
                    showError('Kata laluan terlalu lemah. Sila gunakan kata laluan yang lebih kuat.');
                } else {
                    showError('Gagal mengemaskini kata laluan. Sila cuba lagi.');
                }
            } finally {
                setLoading(false);
            }
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Handle auth state change (catches the token from email link)
            supabase.auth.onAuthStateChange(async (event, session) => {
                console.log('Auth event:', event);

                if (event === 'PASSWORD_RECOVERY') {
                    // User clicked the recovery link - they can now reset password
                    console.log('Password recovery mode active');
                } else if (event === 'SIGNED_IN' && session) {
                    // Session is valid
                    console.log('User session active');
                }
            });

            // Check initial session state
            checkSession();
        });
    </script>

    <style>
        .auth-success {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 0.5rem;
            color: #28a745;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .auth-success i {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .auth-warning {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 0.5rem;
            color: #ffc107;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .auth-warning i {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .auth-warning p {
            color: #a8b2d1;
        }
    </style>
</body>

</html>
