<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Kata Laluan | A2Z Creative</title>

    <link rel="icon" href="/favicon.png" type="image/png">
    <meta property="og:image" content="https://a2zcreative.my/images/og-thumbnail.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css?v=205">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="/"><img src="/logo.png" alt="A2Z Creative" height="48"></a>
            <p>Jemputan Digital Profesional</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h2>Lupa Kata Laluan</h2>

            <!-- Success Message -->
            <div class="auth-success" id="authSuccess" style="display: none;">
                <i data-lucide="check-circle"></i>
                <span id="successText">Pautan reset telah dihantar ke emel anda.</span>
            </div>

            <!-- Error Message -->
            <div class="auth-error" id="authError"></div>

            <!-- Info -->
            <p style="color: #8892b0; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6;">
                Masukkan alamat emel anda dan kami akan hantar pautan untuk reset kata laluan.
            </p>

            <!-- Reset Form -->
            <form class="auth-form" id="resetForm">
                <div class="form-group">
                    <label for="email">Emel</label>
                    <input type="email" id="email" name="email" placeholder="nama@contoh.com" required>
                </div>

                <button type="submit" class="auth-submit" id="submitBtn">
                    <span class="btn-text">Hantar Pautan Reset</span>
                    <span class="auth-loading" id="loadingSpinner">
                        <span class="spinner"></span>
                        Menghantar...
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <a href="/auth/login.html" style="display: inline-flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                    Kembali ke Log Masuk
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        lucide.createIcons();

        // Initialize Supabase
        const SUPABASE_URL = 'https://jyvhcspnfvbwgzdtjjlq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmhjc3BuZnZid2d6ZHRqamxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ1MTg4NDIsImV4cCI6MjA1MDA5NDg0Mn0.A0Lu0U5RnUqWjT_m1mB5o2KjRqJOc2yAzLwzxk4vT5A';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function showError(message) {
            authError.textContent = message;
            authError.style.display = 'block';
            authSuccess.style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            authSuccess.style.display = 'flex';
            authError.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            loadingSpinner.style.display = loading ? 'flex' : 'none';
            submitBtn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.style.display = 'none';
            authSuccess.style.display = 'none';

            const email = form.email.value.trim();

            if (!email) {
                showError('Sila masukkan alamat emel anda.');
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/auth/reset-password.html`
                });

                if (error) {
                    throw error;
                }

                // Show success message
                showSuccess('Pautan reset kata laluan telah dihantar ke emel anda. Sila semak inbox dan spam folder.');
                form.reset();

            } catch (error) {
                console.error('Reset password error:', error);

                // Handle specific errors
                if (error.message.includes('rate limit')) {
                    showError('Terlalu banyak permintaan. Sila cuba lagi selepas beberapa minit.');
                } else {
                    showError('Jika akaun wujud, pautan reset akan dihantar ke emel tersebut.');
                    // Still show as success for security (don't reveal if email exists)
                    showSuccess('Jika akaun wujud dengan emel ini, pautan reset akan dihantar. Sila semak inbox dan spam folder.');
                }
            } finally {
                setLoading(false);
            }
        });
    </script>

    <style>
        .auth-success {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 0.5rem;
            color: #28a745;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .auth-success i {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }
    </style>
</body>

</html>
