<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengesahan Berjaya - A2Z Creative</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .success-icon {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon i {
            width: 40px;
            height: 40px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <!-- Icon -->
                <div class="success-icon">
                    <i data-lucide="check-circle"></i>
                </div>

                <h1>Emel Disahkan!</h1>
                <p>Terima kasih kerana mengesahkan emel anda.</p>
                <p style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.95rem;">
                    Akaun anda kini telah diaktifkan sepenuhnya. Anda sekarang boleh menggunakan ciri
                    <strong>Lupa Kata Laluan</strong> jika perlu.
                </p>
            </div>

            <div class="auth-footer" style="margin-top: 2rem;">
                <a href="/auth/login.html" class="btn btn-primary"
                    style="width: 100%; text-decoration: none; text-align: center; display: block;">
                    Log Masuk Sekarang
                </a>
                <p style="margin-top: 1rem;">
                    <a href="/" class="auth-link">Kembali ke Halaman Utama</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>

</html>
