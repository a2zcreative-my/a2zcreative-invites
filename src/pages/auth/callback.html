<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memproses Log Masuk... | A2Z Creative</title>

    <link rel="icon" href="/favicon.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css?v=205">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="/"
                style="display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none;">
                <img src="/logo.png" alt="A2Z Creative" height="48">
                <span
                    style="color: #ccd6f6; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; font-family: 'Montserrat', sans-serif;">A2ZCreative</span>
            </a>
        </div>

        <!-- Card -->
        <div class="loading-card">
            <div class="spinner-large" id="spinner"></div>
            <h2 class="loading-title">Memproses Log Masuk</h2>
            <p class="loading-text" id="statusMessage">Sila tunggu sebentar...</p>
            <div class="auth-error" id="errorMessage" style="display: none;"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/js/auth.js?v=101"></script>
    <script>
        // Handle OAuth callback on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const statusMessage = document.getElementById('statusMessage');
            const errorMessage = document.getElementById('errorMessage');
            const spinner = document.getElementById('spinner');

            try {
                // Wait a moment for Supabase to process the hash
                await new Promise(resolve => setTimeout(resolve, 500));

                statusMessage.textContent = 'Menyegerakkan akaun...';

                // Call the callback handler from auth.js
                const redirect = await window.handleOAuthCallback();

                if (redirect) {
                    statusMessage.textContent = 'Berjaya! Mengalihkan...';
                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 500);
                } else {
                    throw new Error('Gagal menyegerakkan akaun');
                }
            } catch (error) {
                console.error('Callback error:', error);
                spinner.style.display = 'none';
                statusMessage.textContent = 'Ralat berlaku';
                errorMessage.textContent = error.message || 'Sila cuba log masuk semula.';
                errorMessage.classList.add('visible');

                // Redirect back to login after a delay
                setTimeout(() => {
                    window.location.href = '/auth/login.html';
                }, 3000);
            }
        });
    </script>
</body>

</html>
