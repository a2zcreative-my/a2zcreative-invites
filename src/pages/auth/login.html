<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | A2Z Creative</title>

    <link rel="icon" href="/favicon.png" type="image/png">
    <meta property="og:image" content="https://a2zcreative.my/images/og-thumbnail.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css?v=2">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="/"><img src="/logo.png" alt="A2Z Creative" height="48"></a>
            <p>Jemputan Digital Profesional</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h2>Log Masuk</h2>

            <!-- Error Message -->
            <div class="auth-error" id="authError"></div>

            <!-- Social Login -->
            <div class="social-buttons">
                <button type="button" class="social-btn google" id="googleLogin">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#DB4437"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#4285F4"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Log masuk dengan Google
                </button>
            </div>

            <!-- Divider -->
            <div class="auth-divider">
                <span>atau</span>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Emel</label>
                    <input type="email" id="email" name="email" placeholder="nama@contoh.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Laluan</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            minlength="6">
                        <button type="button" class="password-toggle" id="togglePassword"
                            onclick="togglePasswordVisibility(this)">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="forgot-link">
                    <a href="/auth/forgot-password.html">Lupa kata laluan?</a>
                </div>

                <button type="submit" class="auth-submit" id="submitBtn">
                    <span class="btn-text">Log Masuk</span>
                    <span class="auth-loading" id="loadingSpinner">
                        <span class="spinner"></span>
                        Memproses...
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Belum ada akaun? <a href="/auth/register.html">Daftar sekarang</a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/js/auth.js?v=100" defer></script>
    <script>
        lucide.createIcons();

        // RELIABLE ADMIN LOGIN OVERRIDE
        // REMOVED: Insecure hardcoded credentials.
        // Use standard server-driven auth powered by auth.js

        // INLINE PASSWORD TOGGLE (Guaranteed to work)
        function togglePasswordVisibility(buttonElement) {
            if (!buttonElement) return;

            // Find the input relative to the button (sibling)
            const wrapper = buttonElement.closest('.password-wrapper');
            const input = wrapper.querySelector('input');

            if (!input) return;

            // Toggle type
            const isCurrentlyPassword = input.type === 'password';
            input.type = isCurrentlyPassword ? 'text' : 'password';

            // Direct SVG Icons
            const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;

            const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

            // Update Button Content
            buttonElement.innerHTML = isCurrentlyPassword ? eyeOffIcon : eyeIcon;
        }
    </script>
</body>

</html>
