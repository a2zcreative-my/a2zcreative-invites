<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Data View</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            text-align: center;
            color: #3b82f6;
        }

        /* Login Form */
        #login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            margin-bottom: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #2563eb;
        }

        .wa-btn {
            display: inline-block;
            padding: 5px 12px;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .wa-btn:hover {
            background-color: #16a34a;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #0f172a;
            color: #94a3b8;
        }

        tr:hover {
            background: #334155;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }

        #map {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Client Data</h1>

        <!-- Login Section -->
        <div id="login-section">
            <input type="password" id="password" placeholder="Enter Admin Password">
            <button onclick="login()">Access Data</button>
            <p id="error-msg" class="error hidden">Invalid Password or Data Load Error</p>
        </div>

        <!-- Data Section -->
        <div id="data-section" class="hidden">
            <div id="map"></div>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Phone</th>
                        <th>Action</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = '/profile/fetch-clients'; // Matches existing functions/profile/fetch-clients.js

        async function login() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${password}`
                    }
                });

                if (response.ok) {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        renderTable(data);
                        document.getElementById('login-section').classList.add('hidden');
                        document.getElementById('data-section').classList.remove('hidden');
                    } catch (e) {
                        // Show first 200 chars to identify if it is HTML
                        throw new Error(`Invalid JSON: ${text.substring(0, 200)}...`);
                    }
                } else {
                    const text = await response.text();
                    throw new Error(`Server Error (${response.status}): ${text}`);
                }

            } catch (err) {
                console.error("Login Failed:", err);
                errorMsg.innerHTML = `Error: ${err.message}<br><small>Target: ${new URL(API_URL, window.location.href).href}</small>`;
                errorMsg.classList.remove('hidden');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${row.name}</td>
                    <td>${row.location}</td>
                    <td>${row.phone}</td>
                    <td>
                        <a href="https://wa.me/${row.phone.replace(/^0/, '60')}" target="_blank" class="wa-btn">
                            WhatsApp
                        </a>
                    </td>
                    <td>${new Date(row.created_at).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });

            initMap(data);
        }

        const stateCoords = {
            "Johor": [1.9344, 103.3587],
            "Kedah": [6.1184, 100.3685],
            "Kelantan": [5.1500, 101.9758],
            "Melaka": [2.1896, 102.2501],
            "Negeri Sembilan": [2.7258, 101.9424],
            "Pahang": [3.8126, 103.3256],
            "Penang": [5.4141, 100.3288],
            "Perak": [4.6936, 101.1176],
            "Perlis": [6.4449, 100.2048],
            "Sabah": [5.9788, 116.0753],
            "Sarawak": [1.5533, 110.3592],
            "Selangor": [3.0738, 101.5183],
            "Terengganu": [5.3117, 103.1324],
            "Kuala Lumpur": [3.1390, 101.6869],
            "Putrajaya": [2.9264, 101.6964],
            "Labuan": [5.2831, 115.2308]
        };

        function initMap(data) {
            // Default center: Malaysia
            const map = L.map('map').setView([4.2105, 101.9758], 6);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            data.forEach(client => {
                const coords = stateCoords[client.location];
                if (coords) {
                    // Add a small random offset so pins don't overlap perfectly
                    const lat = coords[0] + (Math.random() - 0.5) * 0.05;
                    const lng = coords[1] + (Math.random() - 0.5) * 0.05;

                    L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>${client.name}</b><br>${client.location}<br>${client.phone}`);
                }
            });
        }
    </script>
</body>

</html>
