<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Data View</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            text-align: center;
            color: #3b82f6;
        }

        /* Login Form */
        #login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            margin-bottom: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #2563eb;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #0f172a;
            color: #94a3b8;
        }

        tr:hover {
            background: #334155;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Client Data</h1>

        <!-- Login Section -->
        <div id="login-section">
            <input type="password" id="password" placeholder="Enter Admin Password">
            <button onclick="login()">Access Data</button>
            <p id="error-msg" class="error hidden">Invalid Password or Data Load Error</p>
        </div>

        <!-- Data Section -->
        <div id="data-section" class="hidden">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Phone</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = '../api/clients'; // Relative path to worker API

        async function login() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${password}`
                    }
                });

                if (response.ok) {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        renderTable(data);
                        document.getElementById('login-section').classList.add('hidden');
                        document.getElementById('data-section').classList.remove('hidden');
                    } catch (e) {
                        throw new Error(`Invalid JSON response: ${text.substring(0, 50)}...`);
                    }
                } else {
                    const text = await response.text();
                    throw new Error(`Server Error (${response.status}): ${text}`);
                }

            } catch (err) {
                console.error("Login Failed:", err);
                errorMsg.innerHTML = `Error: ${err.message}<br><small>Target: ${new URL(API_URL, window.location.href).href}</small>`;
                errorMsg.classList.remove('hidden');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${row.name}</td>
                    <td>${row.location}</td>
                    <td>${row.phone}</td>
                    <td>${new Date(row.created_at).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
